<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecta Pro - Painel do Revendedor</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #e1e1e6;
            --accent-color: #00b37e;
            --accent-hover: #00875f;
            --border-color: #29292e;
            --error-color: #f75a68;
            --whatsapp-color: #25d366;
            --whatsapp-hover: #128c7e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- TELA DE LOGIN --- */
        #loginScreen {
            width: 100%;
            max-width: 400px;
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            text-align: center;
        }

        #loginScreen h2 { margin-bottom: 25px; color: #fff; }

        .error-msg {
            color: var(--error-color);
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
        }

        /* --- CONTAINER PRINCIPAL --- */
        #mainContent {
            display: none;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            margin-top: 20px;
        }

        h1 { font-size: 1.4rem; margin-bottom: 20px; color: #fff; text-align: center; }

        .tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }

        .tab-btn {
            flex: 1;
            padding: 10px 3px;
            background-color: #29292e;
            color: #a8a8b3;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.70rem;
            font-weight: bold;
            cursor: pointer;
            min-width: 70px;
            transition: 0.2s;
        }

        .tab-btn.active { background-color: var(--accent-color); color: #fff; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #a8a8b3; font-size: 0.9rem; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background-color: #09090a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            outline: none;
        }

        textarea { height: 260px; margin-top: 10px; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; line-height: 1.4; }

        .action-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .action-btn:hover { background-color: var(--accent-hover); }

        .btn-copy { background-color: #29292e; margin-top: 8px; }
        .btn-whatsapp { background-color: var(--whatsapp-color); color: #000; margin-top: 5px; }
        .btn-whatsapp:hover { background-color: #128c7e; color: #fff; }

        .logout-link {
            display: block;
            margin-top: 15px;
            color: #7c7c8a;
            font-size: 0.8rem;
            text-decoration: none;
            cursor: pointer;
        }

        .footer { margin-top: 30px; font-size: 0.8rem; color: #7c7c8a; text-align: center; }
        
        /* Loading animation */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h2>Connecta Pro</h2>
        <div id="error" class="error-msg">Usuário ou senha incorretos!</div>
        <div class="input-group">
            <label>Usuário</label>
            <input type="text" id="userInput" placeholder="Digite seu usuário">
        </div>
        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="passInput" placeholder="Digite sua senha">
        </div>
        <button class="action-btn" onclick="tryLogin()">Entrar no Sistema</button>
    </div>

    <div id="mainContent">
        <h1>Gerador Connecta Pro</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('ofertas')">Ofertas</button>
            <button class="tab-btn" onclick="switchTab('cobranca')">Cobrança</button>
            <button class="tab-btn" onclick="switchTab('pix')">Pix</button>
            <button class="tab-btn" onclick="switchTab('fun')">Divertidos</button>
            <button class="tab-btn" onclick="switchTab('novas')">Novas</button>
            <button class="tab-btn" onclick="switchTab('jogos')">Jogos API</button>
        </div>

        <div id="secaoOfertas" class="tab-content active">
            <div class="input-group"><label>Valor do Plano (R$):</label><input type="text" id="vOferta" value="25,00"></div>
            <button class="action-btn" onclick="gerarOferta()">Gerar Oferta Completa</button>
            <textarea id="resOferta" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resOferta')">📋 Copiar Texto</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resOferta')">📲 Enviar no WhatsApp</button>
        </div>

        <div id="secaoCobranca" class="tab-content">
            <div class="input-group"><label>Nome do Cliente:</label><input type="text" id="nCli" placeholder="Ex: João"></div>
            <div class="input-group">
                <label>Tipo de Mensagem:</label>
                <select id="tCobranca">
                    <option value="1">Aviso: Vence Amanhã</option>
                    <option value="0">Aviso: Vence Hoje</option>
                    <option value="expirou">❌ Aviso: Expirou</option>
                    <option value="obrigado">🎉 Agradecimento (Renovado)</option>
                </select>
            </div>
            <button class="action-btn" onclick="gerarCobranca()">Gerar Mensagem de Cobrança</button>
            <textarea id="resCobranca" style="height: 160px;" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resCobranca')">📋 Copiar Texto</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resCobranca')">📲 Enviar no WhatsApp</button>
        </div>

        <div id="secaoPix" class="tab-content">
            <div class="input-group"><label>Sua Chave Pix:</label><input type="text" id="cPix" placeholder="E-mail, CPF ou Celular"></div>
            <div class="input-group"><label>Nome do Titular:</label><input type="text" id="nPix" placeholder="Nome do Beneficiário"></div>
            <button class="action-btn" onclick="gerarPix()">Gerar Dados de Pagamento</button>
            <textarea id="resPix" style="height: 160px;" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resPix')">📋 Copiar Texto</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resPix')">📲 Enviar no WhatsApp</button>
        </div>

        <div id="secaoFun" class="tab-content">
            <div class="input-group"><label>Preço para o texto:</label><input type="text" id="pFun" value="R$ 25,00"></div>
            <button class="action-btn" onclick="gerarTextoDivertido()">🎲 Sortear Texto Divertido</button>
            <textarea id="resFun" style="height: 180px;" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resFun')">📋 Copiar Texto Divertido</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resFun')">📲 Enviar no WhatsApp</button>
        </div>

        <div id="secaoNovas" class="tab-content">
            <div class="input-group">
                <label>Selecione o Modelo:</label>
                <select id="tipoNovas">
                    <option value="maes">🎁 Promoção Mês das Mães</option>
                    <option value="indicacao">👥 Indicação Premiada</option>
                    <option value="suporte">🛠️ Suporte (Reiniciar)</option>
                </select>
            </div>
            <button class="action-btn" onclick="gerarNovasMensagens()">Gerar Mensagem</button>
            <textarea id="resNovas" style="height: 180px;" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resNovas')">📋 Copiar Texto</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resNovas')">📲 Enviar no WhatsApp</button>
        </div>

        <div id="secaoJogos" class="tab-content">
            <div class="input-group">
                <label>⚽ API de Jogos (TheSportsDB - Gratuita):</label>
                <input type="text" id="apiKey" placeholder="A chave não é necessária - API gratuita!" value="API Gratuita - Sem necessidade de chave">
            </div>
            <button class="action-btn" onclick="buscarJogosDoDia()">⚽ Buscar Jogos de Hoje</button>
            <textarea id="resJogos" style="height: 200px;" placeholder="Clique em 'Buscar Jogos de Hoje' para ver as partidas reais..." readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resJogos')">📋 Copiar Jogos</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resJogos')">📲 Enviar no WhatsApp</button>
        </div>

        <span class="logout-link" onclick="location.reload()">🔒 Sair do Sistema</span>
    </div>

    <div class="footer">Direitos reservados CONNECTA PRO / WebertMaster</div>

    <script>
        // LÓGICA DE LOGIN
        function tryLogin() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            const error = document.getElementById('error');

            if(u === "admin" && p === "1234") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                gerarOferta();
                gerarCobranca();
                gerarPix();
                gerarTextoDivertido();
                gerarNovasMensagens();
            } else {
                error.style.display = 'block';
            }
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('secao' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
        }

        function copy(id) {
            const t = document.getElementById(id); 
            t.select(); 
            document.execCommand('copy');
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '✅ Copiado!';
            setTimeout(() => { btn.innerText = originalText; }, 1500);
        }

        // FUNÇÃO PARA ENVIAR PARA O WHATSAPP
        function enviarWhatsApp(id) {
            const texto = document.getElementById(id).value;
            if (!texto.trim()) {
                alert('Nenhum texto para enviar!');
                return;
            }
            const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(texto)}`;
            window.open(url, '_blank');
        }

        // GERADORES
        function gerarOferta() {
            const v = document.getElementById('vOferta').value;
            document.getElementById('resOferta').value = `🍀LIBERADO + DE 100 MIL CONTEÚDOS🍀\n\n✔️CANAIS ✔️NOVELAS\n✔️FILMES  ✔️SÉRIES\n♾♾♾♾♾♾♾♾♾♾\nGRADE COM GRANDES VARIEDADES:\n\n✅ 🎬FAZENDA 2023\n✅ ⚽️ FOX SPORTS\n✅ 🏟 PREMIERE\n✅ ⚽️ CONMEBOL LIBERTADORES \n✅ 💪 UFC\n✅ 🎭 HBO\n✅ 🎬 TELECINE\n✅ 📺 ABERTOS\n✅ 👶 INFANTIS\n✅ 🍿 FILMES E SÉRIES\n✅ 🏀 ESPORTES\n✅ 🇵🇹 INTERNACIONAIS\n✅ 📽 DOCUMENTÁRIOS\n✅ 📺 24HORAS\n✅ 🕍 RELIGIOSOS\n✅ 👩 NOVELAS\n✅ 🎤 NOTÍCIAS\n✅ 🔞 ADULTOS ⚠️ (OPCIONAL) ⚠️\n\nFUNCIONA EM:\n📌 SMART TV\n📌 TV BOX\n📌 TABLETS\n📌 NOTEBOOKS/MAC\n📌 COMPUTADOR\n📌 CELULAR (IOS E ANDROID)\n\nAproveita tudo isso por apenas R$ ${v}/mês!`;
        }

        function gerarCobranca() {
            const n = document.getElementById('nCli').value || "Cliente";
            const t = document.getElementById('tCobranca').value;
            let txt = "";

            if (t === "obrigado") {
                txt = `🎉 ACESSO RENOVADO COM SUCESSO! 🎉\n\nOlá, ${n}!\n\nSeu pagamento foi confirmado e seu acesso já está renovado por mais 30 dias. ✅\n\nMuito obrigado pela confiança e preferência. Continue aproveitando o melhor do entretenimento!\n\nBom divertimento! 🍿📺`;
            } else if (t === "expirou") {
                txt = `⚠️ SEU ACESSO EXPIROU! ⚠️\n\nOlá, ${n}!\n\nInformamos que seu plano venceu e o sinal foi interrompido automaticamente pelo sistema. 🚫📺\n\nPara voltar a curtir todos os canais, filmes e séries, basta realizar a renovação.\n\nEstamos aguardando você para liberar seu sinal agora mesmo! 🚀`;
            } else {
                const msg = t === "1" ? "vence AMANHÃ!" : "vence HOJE!";
                txt = `🔔 AVISO DE VENCIMENTO 🔔\n\nOlá, ${n}! Tudo bem?\n\nPassando para lembrar que o seu acesso ${msg} 🗓️\n\nNão deixe sua programação favorita pausar. Podemos renovar?\n\nQualquer dúvida, estamos à disposição! 🍿📺`;
            }
            document.getElementById('resCobranca').value = txt;
        }

        function gerarPix() {
            const c = document.getElementById('cPix').value || "[CHAVE]";
            const n = document.getElementById('nPix').value || "[NOME]";
            document.getElementById('resPix').value = `💳 DADOS PARA PAGAMENTO PIX\n\n👤 Titular: ${n}\n🔑 Chave Pix: ${c}\n\n👉 Após realizar o pagamento, envie o comprovante aqui para a ativação imediata do seu sinal! ✅`;
        }

        function gerarTextoDivertido() {
            const preco = document.getElementById('pFun').value;
            const mensagens = [
                `PARE TUDO! ✋🛑\nVocê ainda paga caro em streaming? 🤡 Por apenas ${preco} você tem TUDO o que os outros têm. 🤣\n✅ Canais, Filmes e Séries. Bora testar? 🍿📺`,
                `VAMOS SER SINCEROS? 🤔\nVocê só quer chegar em casa e assistir seu jogo em paz. ⚽\nPrometo a MELHOR LISTA por apenas ${preco}. Chama aqui! 👇`,
                `Sabe o que custa ${preco}? 🤔\nUm lanche ou... UM MÊS INTEIRO de cinema! 🍔❌ 🎬✅\nA escolha é óbvia, né? Me chama!`,
                `O VAR analisou e confirmou: ✅\nEssa é a melhor oferta de hoje! Todos os canais por apenas ${preco}. ⚽🔥`,
                `Cansado de "links duvidosos" que travam? 🏴‍☠️❌\nTenha qualidade profissional e zero estresse por apenas ${preco}. ✨`,
                `Status: Com preguiça de sair, mas com vontade de ver filme. 😴🎬\nPor ${preco} eu tenho o cinema no meu sofá. Quer também?`,
                `Sua TV é Smart mas você só usa o YouTube? 🤡\nLiberte todos os canais e filmes por ${preco}. Transforme sua sala em um cinema! 🍿`,
                `Se somar todos os streamings hoje, dá um aluguel! 💸\nAqui você paga ${preco} e tem TODOS em um só lugar. 🧠🚀`,
                `Diz o ditado: "Quem avisa amigo é". 📢\nTem muito filme bom saindo e você vai ficar de fora? Por ${preco} você assiste tudo! 🚀`,
                `VOCÊ VIU ISSO? 😱\nO preço dos streamings subiu de novo... Mas aqui continua ${preco}! 🤫✨ Vem ver! 🍿`
            ];
            const randomMsg = mensagens[Math.floor(Math.random() * mensagens.length)];
            document.getElementById('resFun').value = randomMsg;
        }

        function gerarNovasMensagens() {
            const tipo = document.getElementById('tipoNovas').value;
            let txt = "";
            if (tipo === 'maes') {
                txt = `🎁 MÊS DAS MÃES: PRESENTE QUE FICA! 💖\n\nSua mãe merece o melhor do entretenimento!\n✔️ Todos os canais e filmes.\n🚀 Qualidade garantida.\n\nGaranta o presente dela! 🍿`;
            } else if (tipo === 'indicacao') {
                txt = `👥 INDIQUE E GANHE! 🚀\n\nPara cada amigo que indicar e assinar, você ganha +30 DIAS grátis no seu plano!\n\nQuanto mais indicar, mais assiste sem pagar! 💸✨`;
            } else if (tipo === 'suporte') {
                txt = `🛠️ SUPORTE RÁPIDO\n\nEstá travando? Tente:\n1️⃣ Desligue TV e Roteador da tomada.\n2️⃣ Aguarde 30 segundos e ligue.\n3️⃣ Limpe o cache do app.\n\nIsso resolve 90% casos! 📺`;
            }
            document.getElementById('resNovas').value = txt;
        }

        // ⚽ NOVA FUNÇÃO CORRIGIDA - Usando TheSportsDB (SEM CORS)
        async function buscarJogosDoDia() {
            const resArea = document.getElementById('resJogos');
            const btn = event.target;
            
            // Feedback visual de loading
            const originalText = btn.innerText;
            btn.innerText = '🔄 Buscando jogos...';
            btn.disabled = true;
            
            resArea.value = "🔍 Buscando jogos reais de hoje nas principais ligas...\n\n";

            // Lista de ligas para buscar (IDs do TheSportsDB)
            const ligas = [
                { id: '4328', nome: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League' },
                { id: '4331', nome: '🇪🇸 La Liga' },
                { id: '4332', nome: '🇮🇹 Serie A' },
                { id: '4334', nome: '🇩🇪 Bundesliga' },
                { id: '4335', nome: '🇫🇷 Ligue 1' },
                { id: '4344', nome: '🇧🇷 Brasileirão' },
                { id: '4345', nome: '🏆 Libertadores' },
                { id: '4480', nome: '🇵🇹 Primeira Liga' },
                { id: '4330', nome: '🏆 Champions League' }
            ];

            let todosJogos = [];
            
            try {
                // Busca jogos de todas as ligas em paralelo
                const promessas = ligas.map(async (liga) => {
                    try {
                        const response = await fetch(`https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=${liga.id}`);
                        const data = await response.json();
                        if (data.events && data.events.length > 0) {
                            return data.events.map(jogo => ({
                                ...jogo,
                                ligaNome: liga.nome
                            }));
                        }
                        return [];
                    } catch (error) {
                        console.error(`Erro na liga ${liga.nome}:`, error);
                        return [];
                    }
                });
                
                const resultados = await Promise.all(promessas);
                todosJogos = resultados.flat();
                
                // Remove duplicatas
                todosJogos = todosJogos.filter((jogo, index, self) => 
                    index === self.findIndex(j => j.idEvent === jogo.idEvent)
                );
                
                // Ordena por horário
                todosJogos.sort((a, b) => {
                    const timeA = a.strTime || '23:59';
                    const timeB = b.strTime || '23:59';
                    return timeA.localeCompare(timeB);
                });
                
                if (todosJogos.length > 0) {
                    const hoje = new Date();
                    const dataFormatada = hoje.toLocaleDateString('pt-BR');
                    
                    let txt = `⚽ JOGOS REAIS DE HOJE - ${dataFormatada} ⚽\n`;
                    txt += `🎯 Total: ${todosJogos.length} partidas encontradas\n`;
                    txt += `${'='.repeat(50)}\n\n`;
                    
                    todosJogos.forEach((jogo, index) => {
                        txt += `🏆 ${jogo.ligaNome}\n`;
                        txt += `⚔️ ${jogo.strHomeTeam} vs ${jogo.strAwayTeam}\n`;
                        txt += `⏰ Horário: ${jogo.strTime || 'Horário não definido'}\n`;
                        if (jogo.strVenue) txt += `🏟️ Local: ${jogo.strVenue}\n`;
                        if (jogo.strStatus) txt += `📊 Status: ${jogo.strStatus}\n`;
                        txt += `${'='.repeat(40)}\n\n`;
                    });
                    
                    txt += `\n✅ Dados fornecidos por TheSportsDB\n`;
                    txt += `📅 Atualizado em: ${new Date().toLocaleString('pt-BR')}\n`;
                    txt += `🔗 Dados REAIS de calendários oficiais\n`;
                    
                    resArea.value = txt;
                } else {
                    resArea.value = `⚠️ Nenhum jogo encontrado para hoje (${new Date().toLocaleDateString('pt-BR')})\n\n`;
                    resArea.value += `📌 Possíveis motivos:\n`;
                    resArea.value += `• Não há jogos nas principais ligas hoje\n`;
                    resArea.value += `• Os dados são atualizados periodicamente pela comunidade\n`;
                    resArea.value += `\n💡 Dica: Tente novamente amanhã ou em dias de jogos grandes!\n`;
                }
                
            } catch (error) {
                console.error('Erro completo:', error);
                resArea.value = `❌ Erro ao buscar jogos: ${error.message}\n\n`;
                resArea.value += `🔧 Verifique sua conexão com a internet.\n`;
                resArea.value += `💡 A API TheSportsDB é gratuita e não precisa de chave!\n`;
            } finally {
                // Restaura o botão
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
