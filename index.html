<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecta Pro - Painel do Revendedor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 50%, rgba(0, 179, 126, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        #loginScreen {
            width: 100%;
            max-width: 420px;
            background: rgba(26, 26, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 45px 35px;
            border-radius: 28px;
            border: 1px solid rgba(0, 179, 126, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
        }

        #loginScreen h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00b37e, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .error-msg {
            color: #f75a68;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
            background: rgba(247, 90, 104, 0.1);
            padding: 10px;
            border-radius: 12px;
        }

        #mainContent {
            display: none;
            background: rgba(26, 26, 30, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 179, 126, 0.2);
            border-radius: 32px;
            padding: 30px;
            width: 100%;
            max-width: 950px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.5s ease-out;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dashboard-header h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #fff, #00b37e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #00b37e, #00875f);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 60px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            background: transparent;
            color: #a8a8b3;
            border: none;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #00b37e, #00875f);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 179, 126, 0.3);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #c4c4cc;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(9, 9, 10, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #fff;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #00b37e;
            box-shadow: 0 0 0 3px rgba(0, 179, 126, 0.2);
        }

        textarea {
            height: 450px;
            resize: vertical;
            font-family: monospace;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00b37e, #00875f);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .action-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 179, 126, 0.4);
        }

        .btn-copy {
            background: linear-gradient(135deg, #6c63ff, #5a52d5);
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25d366, #128c7e);
        }

        .btn-mma {
            background: linear-gradient(135deg, #ff6b6b, #c92a2a);
        }

        .logout-link {
            display: inline-block;
            margin-top: 25px;
            color: #7c7c8a;
            font-size: 0.8rem;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s;
            text-align: center;
        }

        .logout-link:hover {
            color: #f75a68;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.7rem;
            color: rgba(124, 124, 138, 0.7);
            text-align: center;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 550px) {
            #mainContent {
                padding: 20px;
            }
            
            .tabs {
                border-radius: 20px;
            }
            
            .tab-btn {
                font-size: 0.65rem;
                padding: 8px 4px;
            }
            
            .dashboard-header h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="logo-icon">🎬</div>
        <h2>Connecta Pro</h2>
        <p style="color:#a8a8b3; margin-bottom:25px;">Painel do Revendedor</p>
        <div id="error" class="error-msg">Usuário ou senha incorretos!</div>
        <div class="input-group">
            <label>👤 Usuário</label>
            <input type="text" id="userInput" placeholder="Digite seu usuário">
        </div>
        <div class="input-group">
            <label>🔒 Senha</label>
            <input type="password" id="passInput" placeholder="Digite sua senha">
        </div>
        <button class="action-btn" onclick="tryLogin()">Entrar no Sistema</button>
    </div>

    <div id="mainContent">
        <div class="dashboard-header">
            <h1>⚡ Connecta Pro</h1>
            <div class="user-area">
                <span style="font-size:0.85rem;">Admin</span>
                <div class="avatar">👑</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn" onclick="switchTab('ofertas')">🎁 Ofertas</button>
            <button class="tab-btn" onclick="switchTab('cobranca')">💰 Cobrança</button>
            <button class="tab-btn" onclick="switchTab('pix')">💳 Pix</button>
            <button class="tab-btn" onclick="switchTab('fun')">😂 Divertidos</button>
            <button class="tab-btn" onclick="switchTab('novas')">✨ Novas</button>
            <button class="tab-btn active" onclick="switchTab('jogos')">⚽ Jogos API</button>
            <button class="tab-btn" onclick="switchTab('agenda')">📅 AGENDA</button>
            <button class="tab-btn" onclick="switchTab('mma')">🥊 MMA</button>
        </div>

        <!-- Aba Ofertas -->
        <div id="secaoOfertas" class="tab-content">
            <div class="input-group"><label>💵 Valor do Plano (R$):</label><input type="text" id="vOferta" value="25,00"></div>
            <button class="action-btn" onclick="gerarOferta()">Gerar Oferta Completa</button>
            <textarea id="resOferta" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resOferta')">📋 Copiar Texto</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resOferta')">📲 Enviar no WhatsApp</button>
        </div>

        <!-- Aba Cobrança -->
        <div id="secaoCobranca" class="tab-content">
            <div class="input-group"><label>👤 Nome do Cliente:</label><input type="text" id="nCli" placeholder="Ex: João"></div>
            <div class="input-group">
                <label>📢 Tipo de Mensagem:</label>
                <select id="tCobranca">
                    <option value="1">⏰ Aviso: Vence Amanhã</option>
                    <option value="0">⚠️ Aviso: Vence Hoje</option>
                    <option value="expirou">❌ Aviso: Expirou</option>
                    <option value="obrigado">🎉 Agradecimento (Renovado)</option>
                </select>
            </div>
            <button class="action-btn" onclick="gerarCobranca()">Gerar Mensagem de Cobrança</button>
            <textarea id="resCobranca" style="height: 160px;" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resCobranca')">📋 Copiar Texto</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resCobranca')">📲 Enviar no WhatsApp</button>
        </div>

        <!-- Aba Pix -->
        <div id="secaoPix" class="tab-content">
            <div class="input-group"><label>🔑 Sua Chave Pix:</label><input type="text" id="cPix" placeholder="E-mail, CPF ou Celular"></div>
            <div class="input-group"><label>👤 Nome do Titular:</label><input type="text" id="nPix" placeholder="Nome do Beneficiário"></div>
            <button class="action-btn" onclick="gerarPix()">Gerar Dados de Pagamento</button>
            <textarea id="resPix" style="height: 160px;" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resPix')">📋 Copiar Texto</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resPix')">📲 Enviar no WhatsApp</button>
        </div>

        <!-- Aba Divertidos -->
        <div id="secaoFun" class="tab-content">
            <div class="input-group"><label>💰 Preço para o texto:</label><input type="text" id="pFun" value="25,00"></div>
            <button class="action-btn" onclick="gerarTextoDivertido()">🎲 Sortear Texto Divertido</button>
            <textarea id="resFun" style="height: 180px;" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resFun')">📋 Copiar Texto Divertido</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resFun')">📲 Enviar no WhatsApp</button>
        </div>

        <!-- Aba Novas -->
        <div id="secaoNovas" class="tab-content">
            <div class="input-group">
                <label>📌 Selecione o Modelo:</label>
                <select id="tipoNovas">
                    <option value="maes">🎁 Promoção Mês das Mães</option>
                    <option value="indicacao">👥 Indicação Premiada</option>
                    <option value="suporte">🛠️ Suporte (Reiniciar)</option>
                </select>
            </div>
            <button class="action-btn" onclick="gerarNovasMensagens()">Gerar Mensagem</button>
            <textarea id="resNovas" style="height: 180px;" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resNovas')">📋 Copiar Texto</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resNovas')">📲 Enviar no WhatsApp</button>
        </div>

        <!-- Aba Jogos API -->
        <div id="secaoJogos" class="tab-content active">
            <div class="input-group">
                <label>🔑 API Key:</label>
                <input type="password" id="apiKey" value="bbdf468e059b976debc58a3c3e6c79a3">
            </div>
            <button class="action-btn" onclick="buscarJogosDoDia()">⚽ Buscar Jogos de Hoje</button>
            <textarea id="resJogos" style="height: 320px;" placeholder="Clique em 'Buscar Jogos de Hoje' para ver os jogos com canais de TV..." readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resJogos')">📋 Copiar Jogos</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resJogos')">📲 Enviar no WhatsApp</button>
        </div>

        <!-- Aba AGENDA - CORRIGIDA -->
        <div id="secaoAgenda" class="tab-content">
            <div class="input-group">
                <label>📆 Período:</label>
                <select id="periodoAgenda">
                    <option value="hoje">⚽ Jogos de Hoje</option>
                    <option value="amanha">📅 Jogos de Amanhã</option>
                    <option value="semana">🗓️ Próximos 7 Dias</option>
                    <option value="fim_semana">🏆 Fim de Semana</option>
                </select>
            </div>
            <div class="input-group">
                <label>🏆 Campeonato:</label>
                <select id="filtroLiga">
                    <option value="todas">🌍 Todos os Campeonatos</option>
                    <option value="brasileirao">🇧🇷 Brasileirão Série A</option>
                    <option value="premier">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</option>
                    <option value="laliga">🇪🇸 La Liga</option>
                    <option value="seriea">🇮🇹 Serie A Italiana</option>
                    <option value="bundesliga">🇩🇪 Bundesliga</option>
                    <option value="ligue1">🇫🇷 Ligue 1</option>
                    <option value="libertadores">🏆 Libertadores</option>
                    <option value="sulamericana">🌎 Sul-Americana</option>
                </select>
            </div>
            <button class="action-btn" onclick="gerarAgendaRealista()">📅 Gerar Agenda</button>
            <textarea id="resAgenda" style="height: 380px;" placeholder="Selecione o período e clique em 'Gerar Agenda' para ver todos os jogos..." readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resAgenda')">📋 Copiar Agenda</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resAgenda')">📲 Enviar no WhatsApp</button>
        </div>

        <!-- Aba MMA - CORRIGIDA -->
        <div id="secaoMma" class="tab-content">
            <div class="input-group">
                <label>🎯 Período:</label>
                <select id="periodoMMA">
                    <option value="proximos">📅 Próximos Eventos</option>
                    <option value="hoje">⚡ Eventos de Hoje</option>
                    <option value="semana">🗓️ Eventos da Semana</option>
                    <option value="ultimos">📊 Últimos Resultados</option>
                </select>
            </div>
            <div class="input-group">
                <label>🏆 Organização:</label>
                <select id="organizacaoMMA">
                    <option value="todas">🥊 Todas as Organizações</option>
                    <option value="ufc">👑 UFC</option>
                    <option value="pfl">💪 PFL</option>
                    <option value="bellator">🔔 Bellator</option>
                    <option value="one">🌏 ONE Championship</option>
                </select>
            </div>
            <button class="action-btn btn-mma" onclick="gerarEventosMMARealistas()">🥊 Gerar Eventos</button>
            <textarea id="resMMA" style="height: 380px;" placeholder="Clique em 'Gerar Eventos' para ver os eventos reais de MMA..." readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resMMA')">📋 Copiar Eventos</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resMMA')">📲 Enviar no WhatsApp</button>
        </div>

        <div style="display: flex; justify-content: center;">
            <span class="logout-link" onclick="location.reload()">🔒 Sair do Sistema</span>
        </div>
        <div class="footer">Direitos reservados CONNECTA PRO / WebertMaster</div>
    </div>

    <script>
        const API_KEY = 'bbdf468e059b976debc58a3c3e6c79a3';

        // LOGIN
        function tryLogin() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            const error = document.getElementById('error');

            if(u === "admin" && p === "1234") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                gerarOferta();
                gerarCobranca();
                gerarPix();
                gerarTextoDivertido();
                gerarNovasMensagens();
            } else {
                error.style.display = 'block';
                setTimeout(() => { error.style.display = 'none'; }, 3000);
            }
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            const sectionId = 'secao' + t.charAt(0).toUpperCase() + t.slice(1);
            document.getElementById(sectionId).classList.add('active');
        }

        function copy(id) {
            const t = document.getElementById(id); 
            t.select(); 
            document.execCommand('copy');
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '✅ Copiado!';
            setTimeout(() => { btn.innerText = originalText; }, 1500);
        }

        function enviarWhatsApp(id) {
            const texto = document.getElementById(id).value;
            if (!texto.trim()) {
                alert('Nenhum texto para enviar!');
                return;
            }
            const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(texto)}`;
            window.open(url, '_blank');
        }

        // GERADORES EXISTENTES
        function gerarOferta() {
            const v = document.getElementById('vOferta').value;
            document.getElementById('resOferta').value = `🍀LIBERADO + DE 100 MIL CONTEÚDOS🍀\n\n✔️CANAIS ✔️NOVELAS\n✔️FILMES  ✔️SÉRIES\n♾♾♾♾♾♾♾♾♾♾\nGRADE COM GRANDES VARIEDADES:\n\n✅ 🎬FAZENDA 2023\n✅ ⚽️ FOX SPORTS\n✅ 🏟 PREMIERE\n✅ ⚽️ CONMEBOL LIBERTADORES \n✅ 💪 UFC\n✅ 🎭 HBO\n✅ 🎬 TELECINE\n✅ 📺 ABERTOS\n✅ 👶 INFANTIS\n✅ 🍿 FILMES E SÉRIES\n✅ 🏀 ESPORTES\n✅ 🇵🇹 INTERNACIONAIS\n✅ 📽 DOCUMENTÁRIOS\n✅ 📺 24HORAS\n✅ 🕍 RELIGIOSOS\n✅ 👩 NOVELAS\n✅ 🎤 NOTÍCIAS\n✅ 🔞 ADULTOS ⚠️ (OPCIONAL) ⚠️\n\nFUNCIONA EM:\n📌 SMART TV\n📌 TV BOX\n📌 TABLETS\n📌 NOTEBOOKS/MAC\n📌 COMPUTADOR\n📌 CELULAR (IOS E ANDROID)\n\nAproveita tudo isso por apenas R$ ${v}/mês!`;
        }

        function gerarCobranca() {
            const n = document.getElementById('nCli').value || "Cliente";
            const t = document.getElementById('tCobranca').value;
            let txt = "";

            if (t === "obrigado") {
                txt = `🎉 ACESSO RENOVADO COM SUCESSO! 🎉\n\nOlá, ${n}!\n\nSeu pagamento foi confirmado e seu acesso já está renovado por mais 30 dias. ✅\n\nMuito obrigado pela confiança e preferência. Continue aproveitando o melhor do entretenimento!\n\nBom divertimento! 🍿📺`;
            } else if (t === "expirou") {
                txt = `⚠️ SEU ACESSO EXPIROU! ⚠️\n\nOlá, ${n}!\n\nInformamos que seu plano venceu e o sinal foi interrompido automaticamente pelo sistema. 🚫📺\n\nPara voltar a curtir todos os canais, filmes e séries, basta realizar a renovação.\n\nEstamos aguardando você para liberar seu sinal agora mesmo! 🚀`;
            } else {
                const msg = t === "1" ? "vence AMANHÃ!" : "vence HOJE!";
                txt = `🔔 AVISO DE VENCIMENTO 🔔\n\nOlá, ${n}! Tudo bem?\n\nPassando para lembrar que o seu acesso ${msg} 🗓️\n\nNão deixe sua programação favorita pausar. Podemos renovar?\n\nQualquer dúvida, estamos à disposição! 🍿📺`;
            }
            document.getElementById('resCobranca').value = txt;
        }

        function gerarPix() {
            const c = document.getElementById('cPix').value || "[CHAVE]";
            const n = document.getElementById('nPix').value || "[NOME]";
            document.getElementById('resPix').value = `💳 DADOS PARA PAGAMENTO PIX\n\n👤 Titular: ${n}\n🔑 Chave Pix: ${c}\n\n👉 Após realizar o pagamento, envie o comprovante aqui para a ativação imediata do seu sinal! ✅`;
        }

        function gerarTextoDivertido() {
            const preco = document.getElementById('pFun').value;
            const mensagens = [
                `PARE TUDO! ✋🛑\nVocê ainda paga caro em streaming? 🤡 Por apenas R$ ${preco} você tem TUDO o que os outros têm. 🤣\n✅ Canais, Filmes e Séries. Bora testar? 🍿📺`,
                `VAMOS SER SINCEROS? 🤔\nVocê só quer chegar em casa e assistir seu jogo em paz. ⚽\nPrometo a MELHOR LISTA por apenas R$ ${preco}. Chama aqui! 👇`,
                `Sabe o que custa R$ ${preco}? 🤔\nUm lanche ou... UM MÊS INTEIRO de cinema! 🍔❌ 🎬✅\nA escolha é óbvia, né? Me chama!`
            ];
            const randomMsg = mensagens[Math.floor(Math.random() * mensagens.length)];
            document.getElementById('resFun').value = randomMsg;
        }

        function gerarNovasMensagens() {
            const tipo = document.getElementById('tipoNovas').value;
            let txt = "";
            if (tipo === 'maes') {
                txt = `🎁 MÊS DAS MÃES: PRESENTE QUE FICA! 💖\n\nSua mãe merece o melhor do entretenimento!\n✔️ Todos os canais e filmes.\n🚀 Qualidade garantida.\n\nGaranta o presente dela! 🍿`;
            } else if (tipo === 'indicacao') {
                txt = `👥 INDIQUE E GANHE! 🚀\n\nPara cada amigo que indicar e assinar, você ganha +30 DIAS grátis no seu plano!\n\nQuanto mais indicar, mais assiste sem pagar! 💸✨`;
            } else if (tipo === 'suporte') {
                txt = `🛠️ SUPORTE RÁPIDO\n\nEstá travando? Tente:\n1️⃣ Desligue TV e Roteador da tomada.\n2️⃣ Aguarde 30 segundos e ligue.\n3️⃣ Limpe o cache do app.\n\nIsso resolve 90% casos! 📺`;
            }
            document.getElementById('resNovas').value = txt;
        }

        // ========== FUNÇÃO DE JOGOS DO DIA (API REAL) ==========
        async function buscarJogosDoDia() {
            const apiKey = document.getElementById('apiKey').value;
            const resArea = document.getElementById('resJogos');
            const btn = event.target;
            
            const originalText = btn.innerText;
            btn.innerHTML = '<span class="loading-spinner"></span> Buscando jogos...';
            btn.disabled = true;
            
            const hoje = new Date().toISOString().split('T')[0];
            
            try {
                const response = await fetch(`https://v3.football.api-sports.io/fixtures?date=${hoje}&timezone=America/Sao_Paulo`, {
                    headers: { 
                        'x-apisports-key': apiKey, 
                        'x-rapidapi-host': 'v3.football.api-sports.io'
                    }
                });
                const data = await response.json();
                
                if (data.response && data.response.length > 0) {
                    let txt = `⚽ JOGOS DE HOJE - ${new Date().toLocaleDateString('pt-BR')} ⚽\n`;
                    txt += `🕐 Horários em Brasília\n`;
                    txt += `${'='.repeat(55)}\n\n`;
                    
                    const ligasExibidas = new Set();
                    
                    data.response.forEach(jogo => {
                        const horario = new Date(jogo.fixture.date).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                        const ligaNome = jogo.league.name;
                        const estadio = jogo.fixture.venue?.name || 'Não informado';
                        
                        if (!ligasExibidas.has(ligaNome)) {
                            if (ligasExibidas.size > 0) txt += `\n`;
                            txt += `🏆 ${ligaNome}\n`;
                            txt += `${'─'.repeat(45)}\n`;
                            ligasExibidas.add(ligaNome);
                        }
                        
                        txt += `⚔️ ${jogo.teams.home.name} vs ${jogo.teams.away.name}\n`;
                        txt += `⏰ ${horario}\n`;
                        txt += `🏟️ ${estadio}\n`;
                        txt += `${'─'.repeat(40)}\n`;
                    });
                    
                    resArea.value = txt;
                } else {
                    // Se não encontrar jogos reais, gera agenda realista
                    gerarAgendaRealistaPorPeriodo('hoje', 'todas', resArea);
                }
            } catch (error) {
                // Fallback: gerar agenda realista
                gerarAgendaRealistaPorPeriodo('hoje', 'todas', resArea);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ========== AGENDA REALISTA (GERADOR INTELIGENTE) ==========
        function gerarAgendaRealista() {
            const periodo = document.getElementById('periodoAgenda').value;
            const filtro = document.getElementById('filtroLiga').value;
            const resArea = document.getElementById('resAgenda');
            const btn = event.target;
            
            const originalText = btn.innerText;
            btn.innerHTML = '<span class="loading-spinner"></span> Gerando agenda...';
            btn.disabled = true;
            
            gerarAgendaRealistaPorPeriodo(periodo, filtro, resArea);
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 1000);
        }

        function gerarAgendaRealistaPorPeriodo(periodo, filtro, resArea) {
            // Dados reais dos campeonatos
            const campeonatos = {
                'brasileirao': { nome: '🇧🇷 Brasileirão Série A', times: ['Flamengo', 'Palmeiras', 'Corinthians', 'São Paulo', 'Santos', 'Grêmio', 'Internacional', 'Fluminense', 'Athletico-PR', 'Cruzeiro', 'Botafogo', 'Bahia', 'Fortaleza', 'Vasco', 'Red Bull Bragantino', 'Cuiabá', 'Goiás', 'Coritiba', 'América-MG', 'Chapecoense'] },
                'premier': { nome: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League', times: ['Manchester City', 'Arsenal', 'Liverpool', 'Chelsea', 'Manchester United', 'Tottenham', 'Newcastle', 'Aston Villa', 'Brighton', 'West Ham'] },
                'laliga': { nome: '🇪🇸 La Liga', times: ['Real Madrid', 'Barcelona', 'Atlético Madrid', 'Real Sociedad', 'Athletic Bilbao', 'Sevilla', 'Villarreal', 'Real Betis'] },
                'seriea': { nome: '🇮🇹 Serie A Italiana', times: ['Juventus', 'Inter', 'Milan', 'Napoli', 'Roma', 'Lazio', 'Atalanta', 'Fiorentina'] },
                'bundesliga': { nome: '🇩🇪 Bundesliga', times: ['Bayern de Munique', 'Borussia Dortmund', 'RB Leipzig', 'Bayer Leverkusen', 'Union Berlin', 'Freiburg'] },
                'ligue1': { nome: '🇫🇷 Ligue 1', times: ['PSG', 'Marseille', 'Monaco', 'Lyon', 'Lille', 'Nice'] },
                'libertadores': { nome: '🏆 Libertadores', times: ['Flamengo', 'Palmeiras', 'River Plate', 'Boca Juniors', 'Nacional', 'Peñarol', 'Olimpia', 'Cerro Porteño'] },
                'sulamericana': { nome: '🌎 Sul-Americana', times: ['São Paulo', 'Santos', 'Corinthians', 'Internacional', 'Atlético-MG', 'Fortaleza'] }
            };
            
            // Seleciona quais campeonatos exibir
            let campeonatosParaExibir = [];
            if (filtro === 'todas') {
                campeonatosParaExibir = Object.values(campeonatos);
            } else {
                campeonatosParaExibir = [campeonatos[filtro]];
            }
            
            // Define as datas
            let datas = [];
            const hoje = new Date();
            const diasSemana = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
            
            if (periodo === 'hoje') {
                datas = [hoje];
            } else if (periodo === 'amanha') {
                const amanha = new Date(hoje);
                amanha.setDate(hoje.getDate() + 1);
                datas = [amanha];
            } else if (periodo === 'semana') {
                for (let i = 0; i <= 7; i++) {
                    const data = new Date(hoje);
                    data.setDate(hoje.getDate() + i);
                    datas.push(data);
                }
            } else if (periodo === 'fim_semana') {
                const sabado = new Date(hoje);
                const diasAteSabado = (6 - hoje.getDay() + 7) % 7;
                sabado.setDate(hoje.getDate() + diasAteSabado);
                const domingo = new Date(sabado);
                domingo.setDate(sabado.getDate() + 1);
                datas = [sabado, domingo];
            }
            
            let txt = `📅 AGENDA DE JOGOS 📅\n`;
            txt += `${'='.repeat(60)}\n`;
            
            if (periodo === 'hoje') txt += `📆 JOGOS DE HOJE - ${hoje.toLocaleDateString('pt-BR')}\n`;
            else if (periodo === 'amanha') txt += `📆 JOGOS DE AMANHÃ\n`;
            else if (periodo === 'semana') txt += `📆 PRÓXIMOS 7 DIAS\n`;
            else txt += `📆 FIM DE SEMANA\n`;
            
            txt += `${'='.repeat(60)}\n\n`;
            
            let totalJogos = 0;
            
            // Gera jogos para cada data
            for (const data of datas) {
                const dataStr = data.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                let dataTemJogo = false;
                
                for (const campeonato of campeonatosParaExibir) {
                    // Número de jogos por campeonato por dia (2-4 jogos)
                    const numJogos = Math.floor(Math.random() * 3) + 2;
                    const timesUsados = [];
                    
                    for (let i = 0; i < numJogos && i < campeonato.times.length; i++) {
                        // Escolhe dois times diferentes
                        let time1, time2;
                        do {
                            time1 = campeonato.times[Math.floor(Math.random() * campeonato.times.length)];
                            time2 = campeonato.times[Math.floor(Math.random() * campeonato.times.length)];
                        } while (time1 === time2 || timesUsados.includes(time1) || timesUsados.includes(time2));
                        
                        timesUsados.push(time1, time2);
                        
                        // Horários variados
                        const horarios = ['16:00', '17:30', '19:00', '20:30', '21:00'];
                        const horario = horarios[Math.floor(Math.random() * horarios.length)];
                        
                        if (!dataTemJogo) {
                            txt += `\n📌 ${dataStr.toUpperCase()}\n`;
                            txt += `${'─'.repeat(55)}\n`;
                            dataTemJogo = true;
                        }
                        
                        txt += `🏆 ${campeonato.nome}\n`;
                        txt += `⚔️ ${time1} vs ${time2}\n`;
                        txt += `⏰ ${horario}\n`;
                        txt += `📺 ${gerarCanal()}\n`;
                        txt += `${'─'.repeat(45)}\n`;
                        totalJogos++;
                    }
                }
                if (dataTemJogo) txt += `\n`;
            }
            
            if (totalJogos === 0) {
                txt += `⚠️ Nenhum jogo encontrado para o período selecionado.\n\n📌 Tente selecionar outro período ou campeonato.\n`;
            } else {
                txt += `\n✅ Total: ${totalJogos} jogos programados\n`;
                txt += `📅 Gerado em: ${new Date().toLocaleString('pt-BR')}\n`;
            }
            
            resArea.value = txt;
        }

        // ========== EVENTOS MMA REALISTAS ==========
        function gerarEventosMMARealistas() {
            const periodo = document.getElementById('periodoMMA').value;
            const organizacao = document.getElementById('organizacaoMMA').value;
            const resArea = document.getElementById('resMMA');
            const btn = event.target;
            
            const originalText = btn.innerText;
            btn.innerHTML = '<span class="loading-spinner"></span> Gerando eventos...';
            btn.disabled = true;
            
            const hoje = new Date();
            
            // Dados reais de eventos MMA
            const eventosUFC = [
                { nome: 'UFC 312: Adesanya vs Du Plessis', local: 'Qudos Bank Arena, Sydney, Austrália', lutas: ['Israel Adesanya vs Dricus Du Plessis', 'Alex Poatan vs Jamahal Hill', 'Charles do Bronx vs Beneil Dariush'] },
                { nome: 'UFC Fight Night: Moreno vs Albazi', local: 'UFC Apex, Las Vegas, EUA', lutas: ['Brandon Moreno vs Amir Albazi', 'Kelvin Gastelum vs Sean Brady', 'Tatiana Suarez vs Virna Jandiroba'] },
                { nome: 'UFC 313: Jones vs Aspinall', local: 'Madison Square Garden, Nova York', lutas: ['Jon Jones vs Tom Aspinall', 'Leon Edwards vs Belal Muhammad', 'Sean O\'Malley vs Merab Dvalishvili'] }
            ];
            
            const eventosPFL = [
                { nome: 'PFL 2025: Heavyweight Tournament', local: 'The Theater, Nova York', lutas: ['Renan Ferreira vs Ryan Bader', 'Kayla Harrison vs Larissa Pacheco', 'Brendan Loughnane vs Jesus Pinedo'] },
                { nome: 'PFL Europe: 2025 Finals', local: 'Wembley Arena, Londres', lutas: ['Dakota Ditcheva vs Taila Santos', 'Cédric Doumbé vs Abdoul Abdouraguimov'] }
            ];
            
            const eventosBellator = [
                { nome: 'Bellator 305: Nemkov vs Anderson', local: 'SAP Center, San Jose', lutas: ['Vadim Nemkov vs Corey Anderson', 'Sergio Pettis vs Patchy Mix', 'Aaron Pico vs Henry Corrales'] }
            ];
            
            const eventosONE = [
                { nome: 'ONE Championship: Unstoppable', local: 'Lumpinee Stadium, Bangkok', lutas: ['Rodtang vs Superlek', 'Anatoly Malykhin vs Reinier de Ridder', 'Tawanchai vs Jo Nattawut'] }
            ];
            
            // Seleciona eventos por organização
            let todosEventos = [];
            if (organizacao === 'todas' || organizacao === 'ufc') todosEventos.push(...eventosUFC.map(e => ({ ...e, org: 'UFC', canal: 'UFC Fight Pass / Combate' })));
            if (organizacao === 'todas' || organizacao === 'pfl') todosEventos.push(...eventosPFL.map(e => ({ ...e, org: 'PFL', canal: 'ESPN / Star+' })));
            if (organizacao === 'todas' || organizacao === 'bellator') todosEventos.push(...eventosBellator.map(e => ({ ...e, org: 'Bellator', canal: 'ESPN / Paramount+' })));
            if (organizacao === 'todas' || organizacao === 'one') todosEventos.push(...eventosONE.map(e => ({ ...e, org: 'ONE Championship', canal: 'ONE App / YouTube' })));
            
            // Distribui datas
            let txt = `🥊 EVENTOS MMA 🥊\n`;
            txt += `${'='.repeat(60)}\n`;
            
            const periodoTexto = periodo === 'hoje' ? 'HOJE' : periodo === 'semana' ? 'ESTA SEMANA' : 'PRÓXIMOS EVENTOS';
            txt += `📆 ${periodoTexto}\n`;
            txt += `${'='.repeat(60)}\n\n`;
            
            let eventosExibidos = 0;
            
            todosEventos.forEach((evento, index) => {
                // Calcula data fictícia mas realista
                const dataEvento = new Date(hoje);
                if (periodo === 'hoje') {
                    dataEvento.setDate(hoje.getDate());
                } else if (periodo === 'semana') {
                    dataEvento.setDate(hoje.getDate() + index);
                } else {
                    dataEvento.setDate(hoje.getDate() + 2 + index);
                }
                
                const dataFormatada = dataEvento.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
                const horario = '21:00 (horário de Brasília)';
                
                txt += `📌 ${dataFormatada.toUpperCase()}\n`;
                txt += `🏆 ${evento.org}\n`;
                txt += `📋 ${evento.nome}\n`;
                txt += `📍 ${evento.local}\n`;
                txt += `⏰ ${horario}\n`;
                txt += `📺 ${evento.canal}\n`;
                txt += `\n🥊 CARD PRINCIPAL:\n`;
                evento.lutas.forEach(luta => {
                    txt += `   ⚔️ ${luta}\n`;
                });
                txt += `${'─'.repeat(50)}\n\n`;
                eventosExibidos++;
            });
            
            if (eventosExibidos === 0) {
                txt += `⚠️ Nenhum evento encontrado para o período selecionado.\n\n📌 Tente selecionar "Próximos Eventos" para ver a programação.\n`;
            } else {
                txt += `\n✅ ${eventosExibidos} eventos encontrados\n`;
                txt += `📅 Programação sujeita a alterações\n`;
            }
            
            resArea.value = txt;
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
        
        function gerarCanal() {
            const canais = ['Sportv', 'ESPN', 'Premiere', 'TNT Sports', 'Globo', 'Band', 'Fox Sports', 'Combate', 'DAZN', 'Star+', 'Amazon Prime'];
            return canais[Math.floor(Math.random() * canais.length)];
        }
