<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecta Pro - Painel do Revendedor</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #e1e1e6;
            --accent-color: #00b37e;
            --accent-hover: #00875f;
            --border-color: #29292e;
            --error-color: #f75a68;
            --whatsapp-color: #25d366;
            --whatsapp-hover: #128c7e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- TELA DE LOGIN --- */
        #loginScreen {
            width: 100%;
            max-width: 400px;
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            text-align: center;
        }

        #loginScreen h2 { margin-bottom: 25px; color: #fff; }

        .error-msg {
            color: var(--error-color);
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
        }

        /* --- CONTAINER PRINCIPAL --- */
        #mainContent {
            display: none;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            margin-top: 20px;
        }

        h1 { font-size: 1.4rem; margin-bottom: 20px; color: #fff; text-align: center; }

        .tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }

        .tab-btn {
            flex: 1;
            padding: 10px 3px;
            background-color: #29292e;
            color: #a8a8b3;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.70rem;
            font-weight: bold;
            cursor: pointer;
            min-width: 70px;
            transition: 0.2s;
        }

        .tab-btn.active { background-color: var(--accent-color); color: #fff; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #a8a8b3; font-size: 0.9rem; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background-color: #09090a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            outline: none;
        }

        textarea { height: 260px; margin-top: 10px; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; line-height: 1.4; }

        .action-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-copy { background-color: #29292e; margin-top: 8px; }
        .btn-whatsapp { background-color: var(--whatsapp-color); color: #000; margin-top: 5px; }

        .logout-link {
            display: block;
            margin-top: 15px;
            color: #7c7c8a;
            font-size: 0.8rem;
            text-decoration: none;
            cursor: pointer;
        }

        .footer { margin-top: 30px; font-size: 0.8rem; color: #7c7c8a; text-align: center; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h2>Connecta Pro</h2>
        <div id="error" class="error-msg">Usuário ou senha incorretos!</div>
        <div class="input-group">
            <label>Usuário</label>
            <input type="text" id="userInput" placeholder="Digite seu usuário">
        </div>
        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="passInput" placeholder="Digite sua senha">
        </div>
        <button class="action-btn" onclick="tryLogin()">Entrar no Sistema</button>
    </div>

    <div id="mainContent">
        <h1>Gerador Connecta Pro</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('ofertas')">Ofertas</button>
            <button class="tab-btn" onclick="switchTab('cobranca')">Cobrança</button>
            <button class="tab-btn" onclick="switchTab('pix')">Pix</button>
            <button class="tab-btn" onclick="switchTab('fun')">Divertidos</button>
            <button class="tab-btn" onclick="switchTab('novas')">Novas</button>
            <button class="tab-btn" onclick="switchTab('jogos')">Jogos API</button>
        </div>

        <!-- ABAS DE CONTEÚDO -->
        <div id="secaoOfertas" class="tab-content active">
            <div class="input-group"><label>Valor do Plano (R$):</label><input type="text" id="vOferta" value="25,00"></div>
            <button class="action-btn" onclick="gerarOferta()">Gerar Oferta Completa</button>
            <textarea id="resOferta" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resOferta')">📋 Copiar Texto</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resOferta')">📲 Enviar no WhatsApp</button>
        </div>

        <div id="secaoCobranca" class="tab-content">
            <div class="input-group"><label>Nome do Cliente:</label><input type="text" id="nCli" placeholder="Ex: João"></div>
            <div class="input-group">
                <label>Tipo de Mensagem:</label>
                <select id="tCobranca">
                    <option value="1">Aviso: Vence Amanhã</option>
                    <option value="0">Aviso: Vence Hoje</option>
                    <option value="expirou">❌ Aviso: Expirou</option>
                    <option value="obrigado">🎉 Agradecimento (Renovado)</option>
                </select>
            </div>
            <button class="action-btn" onclick="gerarCobranca()">Gerar Mensagem de Cobrança</button>
            <textarea id="resCobranca" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resCobranca')">📋 Copiar Texto</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resCobranca')">📲 Enviar no WhatsApp</button>
        </div>

        <div id="secaoPix" class="tab-content">
            <div class="input-group"><label>Sua Chave Pix:</label><input type="text" id="cPix" placeholder="Chave Pix"></div>
            <div class="input-group"><label>Nome do Titular:</label><input type="text" id="nPix" placeholder="Nome"></div>
            <button class="action-btn" onclick="gerarPix()">Gerar Dados Pix</button>
            <textarea id="resPix" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resPix')">📋 Copiar Texto</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resPix')">📲 Enviar no WhatsApp</button>
        </div>

        <div id="secaoFun" class="tab-content">
            <div class="input-group"><label>Preço:</label><input type="text" id="pFun" value="R$ 25,00"></div>
            <button class="action-btn" onclick="gerarTextoDivertido()">🎲 Sortear Texto</button>
            <textarea id="resFun" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resFun')">📋 Copiar Texto</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resFun')">📲 Enviar no WhatsApp</button>
        </div>

        <div id="secaoNovas" class="tab-content">
            <div class="input-group">
                <label>Modelo:</label>
                <select id="tipoNovas">
                    <option value="maes">🎁 Promoção Mês das Mães</option>
                    <option value="indicacao">👥 Indicação Premiada</option>
                    <option value="suporte">🛠️ Suporte (Reiniciar)</option>
                </select>
            </div>
            <button class="action-btn" onclick="gerarNovasMensagens()">Gerar Mensagem</button>
            <textarea id="resNovas" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resNovas')">📋 Copiar Texto</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resNovas')">📲 Enviar no WhatsApp</button>
        </div>

        <div id="secaoJogos" class="tab-content">
            <div class="input-group">
                <label>X-RapidAPI-Key:</label>
                <input type="text" id="apiKey" value="2849cf89e2msh0c69a94f976b2c9p1afe0ajsn36a585521294">
            </div>
            <button class="action-btn" onclick="buscarJogosDoDia()">⚽ Buscar Jogos de Hoje</button>
            <textarea id="resJogos" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy('resJogos')">📋 Copiar Jogos</button>
            <button class="action-btn btn-whatsapp" onclick="enviarWhatsApp('resJogos')">📲 Enviar no WhatsApp</button>
        </div>

        <span class="logout-link" onclick="location.reload()">🔒 Sair do Sistema</span>
    </div>

    <div class="footer">Direitos reservados CONNECTA PRO / WebertMaster</div>

    <script>
        function tryLogin() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            if(u === "admin" && p === "1234") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                gerarOferta();
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('secao' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
        }

        function copy(id) {
            const t = document.getElementById(id); 
            t.select(); 
            document.execCommand('copy');
            alert('Texto copiado!');
        }

        function enviarWhatsApp(id) {
            const texto = document.getElementById(id).value;
            const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(texto)}`;
            window.open(url, '_blank');
        }

        function gerarOferta() {
            const v = document.getElementById('vOferta').value;
            document.getElementById('resOferta').value = `🍀LIBERADO + DE 100 MIL CONTEÚDOS🍀\n\n✔️CANAIS ✔️NOVELAS\n✔️FILMES  ✔️SÉRIES\n♾♾♾♾♾♾♾♾♾♾\nGRADE COM GRANDES VARIEDADES:\n\n✅ 🎬FAZENDA 2023\n✅ ⚽️ FOX SPORTS\n✅ 🏟 PREMIERE\n✅ ⚽️ CONMEBOL LIBERTADORES \n✅ 💪 UFC\n✅ 🎭 HBO\n✅ 🎬 TELECINE\n✅ 📺 ABERTOS\n✅ 👶 INFANTIS\n✅ 🍿 FILMES E SÉRIES\n✅ 🏀 ESPORTES\n✅ 🇵🇹 INTERNACIONAIS\n✅ 📽 DOCUMENTÁRIOS\n✅ 📺 24HORAS\n✅ 🕍 RELIGIOSOS\n✅ 👩 NOVELAS\n✅ 🎤 NOTÍCIAS\n✅ 🔞 ADULTOS ⚠️ (OPCIONAL) ⚠️\n\nFUNCIONA EM:\n📌 SMART TV\n📌 TV BOX\n📌 TABLETS\n📌 NOTEBOOKS/MAC\n📌 COMPUTADOR\n📌 CELULAR (IOS E ANDROID)\n\nAproveita tudo isso por apenas R$ ${v}/mês!`;
        }

        function gerarCobranca() {
            const n = document.getElementById('nCli').value || "Cliente";
            const t = document.getElementById('tCobranca').value;
            let txt = "";
            if (t === "obrigado") {
                txt = `🎉 ACESSO RENOVADO! 🎉\n\nOlá, ${n}!\nSeu pagamento foi confirmado. ✅\nMuito obrigado pela confiança! 🍿📺`;
            } else if (t === "expirou") {
                txt = `⚠️ ACESSO EXPIROU! ⚠️\n\nOlá, ${n}!\nSeu plano venceu e o sinal foi interrompido. 🚫📺\nRenove agora para voltar a curtir! 🚀`;
            } else {
                const msg = t === "1" ? "vence AMANHÃ!" : "vence HOJE!";
                txt = `🔔 VENCIMENTO 🔔\n\nOlá, ${n}!\nLembrando que seu acesso ${msg} 🗓️\nPodemos renovar? 🍿📺`;
            }
            document.getElementById('resCobranca').value = txt;
        }

        function gerarPix() {
            const c = document.getElementById('cPix').value || "Chave Pix";
            const n = document.getElementById('nPix').value || "Nome";
            document.getElementById('resPix').value = `💳 PAGAMENTO PIX\n\n👤 Titular: ${n}\n🔑 Chave Pix: ${c}\n\n👉 Envie o comprovante para ativação imediata! ✅`;
        }

        function gerarTextoDivertido() {
            const preco = document.getElementById('pFun').value;
            const msgs = [
                `PARE TUDO! ✋🛑\nAinda paga caro em streaming? 🤡 Por apenas ${preco} você tem TUDO! 🍿📺`,
                `O VAR analisou e confirmou: ✅\nMelhor oferta de hoje! Todos os canais por ${preco}. ⚽🔥`
            ];
            document.getElementById('resFun').value = msgs[Math.floor(Math.random() * msgs.length)];
        }

        function gerarNovasMensagens() {
            const tipo = document.getElementById('tipoNovas').value;
            let txt = "";
            if (tipo === 'maes') txt = `🎁 MÊS DAS MÃES! 💖\nSua mãe merece o melhor do entretenimento! 🍿`;
            else if (tipo === 'indicacao') txt = `👥 INDIQUE E GANHE! 🚀\nIndique um amigo e ganhe +30 DIAS grátis! 💸✨`;
            else if (tipo === 'suporte') txt = `🛠️ SUPORTE RÁPIDO\nTravando? Desligue a TV e o Roteador da tomada por 30 segundos! 📺`;
            document.getElementById('resNovas').value = txt;
        }

        async function buscarJogosDoDia() {
            const apiKey = document.getElementById('apiKey').value;
            const resArea = document.getElementById('resJogos');
            resArea.value = "Buscando jogos...";
            const today = new Date().toISOString().split('T')[0];
            try {
                const response = await fetch(`https://api-football-v1.p.rapidapi.com/v3/fixtures?date=${today}`, {
                    headers: { 'x-rapidapi-host': 'api-football-v1.p.rapidapi.com', 'x-rapidapi-key': apiKey }
                });
                const data = await response.json();
                if (data.response && data.response.length > 0) {
                    let txt = `⚽ JOGOS DE HOJE (${today})\n\n`;
                    data.response.slice(0, 15).forEach(item => {
                        txt += `🏆 ${item.league.name}\n⚔️ ${item.teams.home.name} x ${item.teams.away.name}\n⏰ ${item.fixture.date.split('T')[1].substring(0,5)}\n--------------------\n`;
                    });
                    resArea.value = txt;
                } else { resArea.value = "Nenhum jogo encontrado."; }
            } catch (error) { resArea.value = "Erro na API."; }
        }
    </script>
</body>
</html>
