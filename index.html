<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geradores Webflix - Premium</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #e1e1e6;
            --accent-color: #00b37e;
            --accent-hover: #00875f;
            --border-color: #29292e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        h1 { font-size: 1.4rem; margin-bottom: 20px; color: #fff; text-align: center; }

        .tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }

        .tab-btn {
            flex: 1;
            padding: 10px 3px;
            background-color: #29292e;
            color: #a8a8b3;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.70rem;
            font-weight: bold;
            cursor: pointer;
            min-width: 80px;
            transition: 0.2s;
        }

        .tab-btn.active { background-color: var(--accent-color); color: #fff; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #a8a8b3; font-size: 0.9rem; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background-color: #09090a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            outline: none;
        }

        textarea { margin-top: 10px; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; line-height: 1.4; }

        .action-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .action-btn:disabled { background-color: #444; cursor: not-allowed; }

        .btn-copy { background-color: #29292e; margin-top: 5px; }
        .btn-copy:hover { background-color: #323238; }

        .footer { margin-top: 30px; font-size: 0.8rem; color: #7c7c8a; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gerador Connecta Pro</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'ofertas')">Ofertas</button>
            <button class="tab-btn" onclick="switchTab(event, 'cobranca')">Cobrança</button>
            <button class="tab-btn" onclick="switchTab(event, 'pix')">Pix</button>
            <button class="tab-btn" onclick="switchTab(event, 'fun')">Divertidos</button>
            <button class="tab-btn" onclick="switchTab(event, 'novas')">Novas Msgs</button>
            <button class="tab-btn" style="background-color: #2c5282; color: #fff;" onclick="switchTab(event, 'futebol')">⚽ Futebol</button>
            <button class="tab-btn" style="background-color: #742a2a; color: #fff;" onclick="switchTab(event, 'mma')">🥊 MMA</button>
        </div>

        <!-- ABA OFERTAS COMPLETA -->
        <div id="secaoOfertas" class="tab-content active">
            <div class="input-group"><label>Valor do Plano (R$):</label><input type="text" id="vOferta" value="25,00"></div>
            <button class="action-btn" onclick="gerarOferta()">Gerar Oferta Completa</button>
            <textarea id="resOferta" style="height: 350px;" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy(event, 'resOferta')">📋 Copiar Texto</button>
        </div>

        <!-- ABA COBRANÇA -->
        <div id="secaoCobranca" class="tab-content">
            <div class="input-group"><label>Nome do Cliente:</label><input type="text" id="nCli" placeholder="Ex: João"></div>
            <div class="input-group">
                <label>Tipo de Mensagem:</label>
                <select id="tCobranca">
                    <option value="1">Aviso: Vence Amanhã</option>
                    <option value="0">Aviso: Vence Hoje</option>
                    <option value="expirou">❌ Aviso: Expirou</option>
                    <option value="obrigado">🎉 Agradecimento (Renovado)</option>
                </select>
            </div>
            <button class="action-btn" onclick="gerarCobranca()">Gerar Mensagem de Cobrança</button>
            <textarea id="resCobranca" style="height: 200px;" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy(event, 'resCobranca')">📋 Copiar Texto</button>
        </div>

        <!-- ABA PIX -->
        <div id="secaoPix" class="tab-content">
            <div class="input-group"><label>Sua Chave Pix:</label><input type="text" id="cPix" placeholder="E-mail, CPF ou Celular"></div>
            <div class="input-group"><label>Nome do Titular:</label><input type="text" id="nPix" placeholder="Nome do Beneficiário"></div>
            <button class="action-btn" onclick="gerarPix()">Gerar Dados de Pagamento</button>
            <textarea id="resPix" style="height: 200px;" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy(event, 'resPix')">📋 Copiar Texto</button>
        </div>

        <!-- ABA DIVERTIDOS -->
        <div id="secaoFun" class="tab-content">
            <div class="input-group"><label>Preço para o texto:</label><input type="text" id="pFun" value="R$ 25,00"></div>
            <button class="action-btn" onclick="gerarTextoDivertido()">🎲 Sortear Texto Divertido</button>
            <textarea id="resFun" style="height: 250px;" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy(event, 'resFun')">📋 Copiar Texto Divertido</button>
        </div>

        <!-- ABA NOVAS MENSAGENS -->
        <div id="secaoNovas" class="tab-content">
            <div class="input-group">
                <label>Selecione o Modelo:</label>
                <select id="tipoNovas">
                    <option value="maes">🎁 Promoção Mês das Mães</option>
                    <option value="indicacao">👥 Indicação Premiada</option>
                    <option value="suporte">🛠️ Suporte (Reiniciar)</option>
                </select>
            </div>
            <button class="action-btn" onclick="gerarNovasMensagens()">Gerar Mensagem</button>
            <textarea id="resNovas" style="height: 250px;" readonly></textarea>
            <button class="action-btn btn-copy" onclick="copy(event, 'resNovas')">📋 Copiar Texto</button>
        </div>

        <!-- ABA FUTEBOL (API Inteligente) -->
        <div id="secaoFutebol" class="tab-content">
            <p style="color: #a8a8b3; font-size: 0.85rem; margin-bottom: 15px; text-align: center;">Busca automática dos jogos de hoje liberada pelo sistema.</p>
            <button class="action-btn" onclick="buscarJogosFutebol()" id="btnFut">⚽ Buscar Jogos de Hoje</button>
            <textarea id="resFutebol" style="height: 250px;" readonly placeholder="A agenda de jogos aparecerá aqui..."></textarea>
            <button class="action-btn btn-copy" onclick="copy(event, 'resFutebol')">📋 Copiar Agenda</button>
        </div>

        <!-- NOVA ABA MMA (Gerador Semi-Manual) -->
        <div id="secaoMma" class="tab-content">
            <p style="color: #a8a8b3; font-size: 0.85rem; margin-bottom: 15px; text-align: center;">Não dependa de APIs lentas! Digite a luta principal e gere o texto de marketing na hora.</p>
            
            <div class="input-group">
                <label>Lutador 1:</label>
                <input type="text" id="lutador1" placeholder="Ex: Charles Do Bronx">
            </div>
            <div class="input-group">
                <label>Lutador 2:</label>
                <input type="text" id="lutador2" placeholder="Ex: Islam Makhachev">
            </div>
            <div class="input-group">
                <label>Categoria ou Evento:</label>
                <input type="text" id="categoriaMma" placeholder="Ex: UFC 300 - Disputa de Cinturão">
            </div>
            <div class="input-group">
                <label>Horário do Card Principal:</label>
                <input type="text" id="horarioMma" placeholder="Ex: 23:00">
            </div>
            
            <button class="action-btn" onclick="gerarTextoMmaManual()">🥊 Gerar Chamada UFC</button>
            <textarea id="resMma" style="height: 200px;" readonly placeholder="O texto da luta aparecerá aqui..."></textarea>
            <button class="action-btn btn-copy" onclick="copy(event, 'resMma')">📋 Copiar Luta</button>
        </div>

    </div>

    <div class="footer">Direitos reservados CONNECTA PRO / WebertMaster</div>

    <script>
        function switchTab(event, t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('secao' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
        }

        function copy(event, id) {
            const t = document.getElementById(id); 
            t.select(); 
            document.execCommand('copy');
            const btn = event.currentTarget;
            const textoOriginal = btn.innerText;
            btn.innerText = '✅ Copiado!';
            setTimeout(() => { btn.innerText = textoOriginal; }, 1500);
        }

        function gerarOferta() {
            const v = document.getElementById('vOferta').value;
            document.getElementById('resOferta').value = `🍀LIBERADO + DE 100 MIL CONTEÚDOS🍀\n\n✔️CANAIS ✔️NOVELAS\n✔️FILMES  ✔️SÉRIES\n♾♾♾♾♾♾♾♾♾♾\nGRADE COM GRANDES VARIEDADES:\n\n✅ 🎬FAZENDA 2023\n✅ ⚽️ FOX SPORTS\n✅ 🏟 PREMIERE\n✅ ⚽️ CONMEBOL LIBERTADORES \n✅ 💪 UFC\n✅ 🎭 HBO\n✅ 🎬 TELECINE\n✅ 📺 ABERTOS\n✅ 👶 INFANTIS\n✅ 🍿 FILMES E SÉRIES\n✅ 🏀 ESPORTES\n✅ 🇵🇹 INTERNACIONAIS\n✅ 📽 DOCUMENTÁRIOS\n✅ 📺 24HORAS\n✅ 🕍 RELIGIOSOS\n✅ 👩 NOVELAS\n✅ 🎤 NOTÍCIAS\n✅ 🔞 ADULTOS ⚠️ (OPCIONAL) ⚠️\n\nFUNCIONA EM:\n📌 SMART TV\n📌 TV BOX\n📌 TABLETS\n📌 NOTEBOOKS/MAC\n📌 COMPUTADOR\n📌 CELULAR (IOS E ANDROID)\n\nAproveita tudo isso por apenas R$ ${v}/mês!`;
        }

        function gerarCobranca() {
            const n = document.getElementById('nCli').value || "Cliente";
            const t = document.getElementById('tCobranca').value;
            let txt = "";

            if (t === "obrigado") {
                txt = `🎉 ACESSO RENOVADO COM SUCESSO! 🎉\n\nOlá, ${n}!\n\nSeu pagamento foi confirmado e seu acesso já está renovado por mais 30 dias. ✅\n\nMuito obrigado pela confiança e preferência. Continue aproveitando o melhor do entretenimento!\n\nBom divertimento! 🍿📺`;
            } else if (t === "expirou") {
                txt = `⚠️ SEU ACESSO EXPIROU! ⚠️\n\nOlá, ${n}!\n\nInformamos que seu plano venceu e o sinal foi interrompido automaticamente pelo sistema. 🚫📺\n\nPara voltar a curtir todos os canais, filmes e séries, basta realizar a renovação.\n\nEstamos aguardando você para liberar seu sinal agora mesmo! 🚀`;
            } else {
                const msg = t === "1" ? "vence AMANHÃ!" : "vence HOJE!";
                txt = `🔔 AVISO DE VENCIMENTO 🔔\n\nOlá, ${n}! Tudo bem?\n\nPassando para lembrar que o seu acesso ${msg} 🗓️\n\nNão deixe sua programação favorita pausar. Podemos renovar?\n\nQualquer dúvida, estamos à disposição! 🍿📺`;
            }
            document.getElementById('resCobranca').value = txt;
        }

        function gerarPix() {
            const c = document.getElementById('cPix').value || "[CHAVE]";
            const n = document.getElementById('nPix').value || "[NOME]";
            document.getElementById('resPix').value = `💳 DADOS PARA PAGAMENTO PIX\n\n👤 Titular: ${n}\n🔑 Chave Pix: ${c}\n\n👉 Após realizar o pagamento, envie o comprovante aqui para a ativação imediata do seu sinal! ✅`;
        }

        function gerarTextoDivertido() {
            const preco = document.getElementById('pFun').value;
            const mensagens = [
                `PARE TUDO! ✋🛑\nVocê ainda paga caro em streaming? 🤡 Por apenas ${preco} você tem TUDO o que os outros têm. 🤣\n✅ Canais, Filmes e Séries. Bora testar? 🍿📺`,
                `VAMOS SER SINCEROS? 🤔\nVocê só quer chegar em casa e assistir seu jogo em paz. ⚽\nPrometo a MELHOR LISTA por apenas ${preco}. Chama aqui! 👇`,
                `Sabe o que custa ${preco}? 🤔\nUm lanche ou... UM MÊS INTEIRO de cinema! 🍔❌ 🎬✅\nA escolha é óbvia, né? Me chama!`,
                `O VAR analisou e confirmou: ✅\nEssa é a melhor oferta de hoje! Todos os canais por apenas ${preco}. ⚽🔥`,
                `Cansado de "links duvidosos" que travam? 🏴‍☠️❌\nTenha qualidade profissional e zero estresse por apenas ${preco}. ✨`,
                `Status: Com preguiça de sair, mas com vontade de ver filme. 😴🎬\nPor ${preco} eu tenho o cinema no meu sofá. Quer também?`,
                `Sua TV é Smart mas você só usa o YouTube? 🤡\nLiberte todos os canais e filmes por ${preco}. Transforme sua sala em um cinema! 🍿`,
                `Se somar todos os streamings hoje, dá um aluguel! 💸\nAqui você paga ${preco} e tem TODOS em um só lugar. 🧠🚀`,
                `Diz o ditado: "Quem avisa amigo é". 📢\nTem muito filme bom saindo e você vai ficar de fora? Por ${preco} você assiste tudo! 🚀`,
                `VOCÊ VIU ISSO? 😱\nO preço dos streamings subiu de novo... Mas aqui continua ${preco}! 🤫✨ Vem ver! 🍿`
            ];
            const randomMsg = mensagens[Math.floor(Math.random() * mensagens.length)];
            document.getElementById('resFun').value = randomMsg;
        }

        function gerarNovasMensagens() {
            const tipo = document.getElementById('tipoNovas').value;
            let txt = "";
            if (tipo === 'maes') {
                txt = `🎁 MÊS DAS MÃES: PRESENTE QUE FICA! 💖\n\nSua mãe merece o melhor do entretenimento!\n✔️ Todos os canais e filmes.\n🚀 Qualidade garantida.\n\nGaranta o presente dela! 🍿`;
            } else if (tipo === 'indicacao') {
                txt = `👥 INDIQUE E GANHE! 🚀\n\nPara cada amigo que indicar e assinar, você ganha +30 DIAS grátis no seu plano!\n\nQuanto mais indicar, mais assiste sem pagar! 💸✨`;
            } else if (tipo === 'suporte') {
                txt = `🛠️ SUPORTE RÁPIDO\n\nEstá travando? Tente:\n1️⃣ Desligue TV e Roteador da tomada.\n2️⃣ Aguarde 2 minutos  e ligue.\n3️⃣ Limpe o cache do app.\n\nIsso resolve 90% dos casos! 📺`;
            }
            document.getElementById('resNovas').value = txt;
        }

        // INTEGRAÇÃO FUTEBOL (MANTIDA COM A API OCULTA NO CÓDIGO)
        async function buscarJogosFutebol() {
            // Chave da API configurada diretamente no código
            const apiKey = "5669c039614a2ca99de58744b1e0da3f"; 
            
            const resArea = document.getElementById('resFutebol');
            const btn = document.getElementById('btnFut');

            if(!apiKey) { 
                alert("Aviso do Sistema: A API Key do administrador não foi configurada no código."); 
                return; 
            }

            btn.innerText = "⏳ Buscando no sistema...";
            btn.disabled = true;
            resArea.value = "Consultando jogos de hoje... Aguarde.";

            try {
                const hoje = new Date().toISOString().split('T')[0];
                const url = `https://v3.football.api-sports.io/fixtures?date=${hoje}&timezone=America/Sao_Paulo`;

                const resposta = await fetch(url, {
                    method: 'GET',
                    headers: { 'x-apisports-key': apiKey }
                });

                const dados = await resposta.json();

                if (dados.errors && Object.keys(dados.errors).length > 0) {
                    resArea.value = "❌ Erro de comunicação com o servidor de esportes.";
                    console.error("Erro da API:", dados.errors);
                    return;
                }

                let jogos = dados.response;
                if (!jogos || jogos.length === 0) {
                    resArea.value = "Nenhum jogo programado para hoje.";
                    return;
                }

                const ligasImportantes = [71, 72, 73, 2, 3, 13, 39, 140, 135, 61]; 
                
                const canaisPorLiga = {
                    71: "Premiere / SporTV / Globo", 
                    72: "SporTV / Premiere / GOAT", 
                    73: "Amazon Prime / SporTV / Globo / Premiere", 
                    2: "TNT Sports / Max / SBT", 
                    3: "ESPN / Disney+ / SBT", 
                    13: "ESPN / Disney+ / Paramount+ / Globo", 
                    39: "ESPN / Disney+", 
                    140: "ESPN / Disney+", 
                    135: "ESPN / Disney+", 
                    61: "ESPN / Disney+" 
                };

                let jogosFiltrados = jogos.filter(jogo => ligasImportantes.includes(jogo.league.id));

                if (jogosFiltrados.length === 0) {
                    jogosFiltrados = jogos.slice(0, 4);
                }

                let textoPromocional = `⚽ *JOGOS DE HOJE - ASSISTA TUDO SEM TRAVAR!* ⚽\n\n`;

                jogosFiltrados.forEach(j => {
                    let hora = new Date(j.fixture.date).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                    let canal = canaisPorLiga[j.league.id] || "Consultar Guia da Webflix";
                    textoPromocional += `${j.league.name} 🏆\n🕒 ${hora} - ${j.teams.home.name} x ${j.teams.away.name}\n📺 Canal: ${canal}\n\n`;
                });

                textoPromocional += `📺 Peça já seu teste grátis e não perca nenhum lance da rodada!`;
                resArea.value = textoPromocional;

            } catch (error) {
                resArea.value = "❌ Ocorreu um erro de conexão. Tente novamente mais tarde.";
            } finally {
                btn.innerText = "⚽ Buscar Jogos de Hoje";
                btn.disabled = false;
            }
        }

        // NOVA FUNÇÃO MMA MANUAL
        function gerarTextoMmaManual() {
            const l1 = document.getElementById('lutador1').value || "[Lutador 1]";
            const l2 = document.getElementById('lutador2').value || "[Lutador 2]";
            const cat = document.getElementById('categoriaMma').value || "UFC Ao Vivo";
            const hora = document.getElementById('horarioMma').value || "[Horário]";

            const txt = `🥊 *UFC AO VIVO NESTE FIM DE SEMANA!* 🥊\n\nAssista ao card completo em qualidade Full HD e não perca nenhum nocaute!\n\n🔥 *LUTA PRINCIPAL:*\n🥋 ${l1} vs ${l2}\n🏆 ${cat}\n🕒 Horário: ${hora}\n📺 Canal: UFC Fight Pass\n\n👉 Peça já seu teste grátis e prepare a pipoca!`;
            
            document.getElementById('resMma').value = txt;
        }

        window.onload = function() {
            gerarOferta();
            gerarCobranca();
            gerarPix();
            gerarTextoDivertido();
            gerarNovasMensagens();
        };
    </script>
</body>
</html>
